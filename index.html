<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#c084fc"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>Sketch Journey ✏️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--card:rgba(255,255,255,0.04);--card-h:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border-h:rgba(255,255,255,0.18);
  --text:#f0eeff;--muted:#8b88a8;--dim:#4a4768;
  --accent:#c084fc;--accent2:#818cf8;--accent3:#f472b6;
  --success:#34d399;--warning:#fbbf24;--danger:#f87171;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body.light{--bg:#f8f7ff;--bg2:#ffffff;--card:rgba(0,0,0,0.03);--card-h:rgba(0,0,0,0.06);--border:rgba(0,0,0,0.08);--border-h:rgba(0,0,0,0.18);--text:#1a1830;--muted:#6b6880;--dim:#a8a6c0;--accent:#9333ea;--accent2:#4f46e5;--accent3:#db2777;--success:#059669;--warning:#d97706;--danger:#dc2626}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #c084fc44}50%{box-shadow:0 0 40px #c084fc88}}
.fade-in{animation:fadeIn .35s ease both}
.float{animation:float 3s ease-in-out infinite}
.glow{animation:glow 2s ease-in-out infinite}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:fixed;left:0;top:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.content{flex:1;margin-left:240px;padding:32px;max-width:calc(100vw - 240px);min-height:100vh}
.mobile-bar{display:none;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--border);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;transition:all .2s}
.card:hover{border-color:var(--border-h);transform:translateY(-2px)}
.glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:16px;transition:all .2s}
body.light .glass{background:rgba(255,255,255,0.75);border-color:rgba(0,0,0,0.08)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;border-radius:10px;margin:2px 12px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .15s;border:1px solid transparent}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,#c084fc22,#818cf811);color:var(--accent);border-color:#c084fc33}
.btn{padding:10px 22px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 20px #c084fc44}
.btn-p:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-g{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-d{background:#f8717122;color:var(--danger);border:1px solid #f8717144;padding:8px 16px;font-size:13px}
.btn-d:hover{background:#f8717133}
input,select,textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px #c084fc20}
input::placeholder,textarea::placeholder{color:var(--dim)}
textarea{resize:vertical;min-height:90px}
select option{background:#1a1830;color:#f0eeff}
.prog-wrap{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#c084fc22;color:var(--accent);border:1px solid #c084fc33}
.grad{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;padding:28px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid #c084fc44;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:10px;z-index:9999;max-width:320px;box-shadow:0 8px 30px rgba(0,0,0,.3);animation:fadeIn .3s}
.art-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.art-card:hover{border-color:#c084fc66;transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.2)}
.art-card:hover .art-overlay{opacity:1}
.art-card:hover .del-btn{opacity:1!important}
.art-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;padding:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.g2-1{display:grid;grid-template-columns:1fr 320px;gap:18px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px}
.tab{flex:1;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .2s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.ach-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;transition:all .2s}
.ach-card.won{border-color:#fbbf2466;background:linear-gradient(135deg,#fbbf2408,var(--card))}
.ach-card.locked{opacity:.5;filter:grayscale(.5)}
.notif{display:flex;gap:12px;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.notif.unread{border-color:#c084fc33;background:#c084fc08}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.bar{flex:1;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:4px 4px 0 0;min-height:4px;position:relative;cursor:pointer;transition:height .5s}
.mood{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:20px;transition:all .15s}
.mood:hover,.mood.sel{border-color:var(--accent);background:#c084fc15;transform:scale(1.1)}
.prompt-c{background:linear-gradient(135deg,#c084fc15,#818cf808);border:1px solid #c084fc33;border-radius:16px;padding:24px;transition:all .2s}
.divider{height:1px;background:var(--border);margin:20px 0}
.lang-dd{position:relative}
.lang-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-width:140px;z-index:400;box-shadow:0 8px 24px rgba(0,0,0,.35);display:none}
.lang-menu.open{display:block;animation:fadeIn .15s}
.lang-opt{padding:10px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.lang-opt:hover{background:var(--card)}
.lang-opt.active{color:var(--accent);font-weight:600}
/* API Key Setup Banner */
.api-banner{background:linear-gradient(135deg,#c084fc15,#818cf808);border:1px solid #c084fc44;border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.api-banner.ok{background:linear-gradient(135deg,#34d39912,transparent);border-color:#34d39944}
.api-key-input{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:monospace;font-size:13px;flex:1;min-width:200px}
.api-key-input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px #c084fc20}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.4)}
  .content{margin-left:0;padding:16px;max-width:100vw}
  .mobile-bar{display:flex}
  .g2,.g3,.g4,.g2-1{grid-template-columns:1fr!important;gap:12px!important}
  .g2-1>div:first-child{order:2}
  .g2-1>div:last-child{order:1}
  input,select,textarea{font-size:16px!important}
  .mood{flex:1;min-width:45px}
  .btn{width:100%;justify-content:center!important}
}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}

/* Adsterra Ad Container */
.adsterra-container{
  width:100%;
  max-width:468px;
  margin:0 auto;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--bg2);
  transition:all .2s;
}
.adsterra-container:hover{
  border-color:var(--accent);
  box-shadow:0 4px 20px rgba(192,132,252,0.15);
}
.adsterra-label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:6px 0;
  font-size:10px;
  font-weight:600;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:1px;
  background:var(--card);
  border-bottom:1px solid var(--border);
}
.adsterra-iframe{
  width:100%;
  height:60px;
  border:none;
  display:block;
}
@media(max-width:768px){
  .adsterra-container{max-width:320px}
  .adsterra-iframe{height:50px}
}
</style>

// used to be a static import right here, alongside app/auth/firestore.
// Static ES module imports are all-or-nothing — if THIS ONE file failed to
// load for any reason (slow connection, transient CDN hiccup, a privacy
// extension being more aggressive about anything named "messaging"/FCM),
// the browser refused to run ANY of this script, so auth and Firestore
// never initialized either — even on a connection that loaded them fine
// moments earlier when tested directly. Messaging (push notifications) is
// optional, so it's now loaded dynamically, after core Firebase is already
// marked ready, and its failure can never block sign-in or data again.

const firebaseConfig = {
  apiKey: "AIzaSyDdL9Nu3PMEXBPm_b744zEeoQo-M1CSGw8",
  authDomain: "sketch-journey-29416.firebaseapp.com",

  appId: "1:868327118468:web:9e783cc027d0302d6894d1",
  measurementId: "G-9F00CVZJHN"
};

const fbApp = initializeApp(firebaseConfig);
const fbAuth = getAuth(fbApp);
// IMPORTANT (data-loss fix): enable Firestore's built-in offline persistence.
// Without this, entries written while offline (or during a flaky connection)
// were never queued anywhere — the write promise could hang/fail and the
// entry would silently vanish the next time the realtime listener resynced
// from the server. persistentLocalCache stores writes in IndexedDB and
// syncs them automatically once the connection is back.
let fbDb;
try{
  fbDb = initializeFirestore(fbApp, {
    localCache: persistentLocalCache({ tabManager: persistentSingleTabManager() })
  });
}catch(e){
  // initializeFirestore throws if called twice (e.g. hot reload) or if the
  // browser doesn't support IndexedDB — fall back to the plain in-memory client.
  console.warn('Firestore offline persistence unavailable, falling back to in-memory cache:', e);
  fbDb = getFirestore(fbApp);
}

// Expose to global scope so the classic script below can use them
// IMPORTANT: messaging is set up separately and lazily so a messaging
// failure (e.g. unsupported browser) never blocks auth/firestore.
window.__firebase = {
  auth: fbAuth, db: fbDb, googleProvider: fbGoogleProvider,
  signInWithPopup, signInWithRedirect, getRedirectResult, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  sendPasswordResetEmail, onAuthStateChanged, signOut,
  doc, setDoc, getDoc, collection, query, onSnapshot, deleteDoc, serverTimestamp,
  messaging: null, getToken: null, onMessage: null
};

window.dispatchEvent(new Event('firebase-ready'));

// Load messaging separately and lazily, via a dynamic import — this can
// fail (unsupported browser, blocked/slow network for this one file)
// without ever affecting the auth/Firestore readiness above.
(async () => {
  try {
    const { getMessaging, getToken, onMessage } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-messaging.js");
    window.__firebase.getToken = getToken;
    window.__firebase.onMessage = onMessage;
    window.__firebase.messaging = getMessaging(fbApp);
    console.log('Firebase Messaging initialized successfully');
  } catch(e) {
    console.warn('Firebase Messaging not available on this browser:', e.message);
    window.__firebase.messaging = null;
  }
})();

const ACHIEVEMENTS = ACHIEVEMENTS_I18N.en;
function getAchievements(){return ACHIEVEMENTS_I18N[_lang]||ACHIEVEMENTS_I18N.en;}
const COLORS=[["#c084fc","#818cf8"],["#f472b6","#fb7185"],["#34d399","#10b981"],["#fbbf24","#f59e0b"],["#60a5fa","#3b82f6"]];
const gid=()=>Math.random().toString(36).substr(2,9);
let _lang="en";
const fmtDate=d=>{const locale=_lang==='ar'?'ar-SA':_lang==='tr'?'tr-TR':'en-US';return new Date(d).toLocaleDateString(locale,{year:"numeric",month:"short",day:"numeric"});};
const fmtTime=m=>m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;
function timeAgo(dateStr){
  if(!dateStr||dateStr==='Just now')return _lang==='ar'?'الآن':_lang==='tr'?'Şimdi':'Just now';
  try{
    const diff=Date.now()-new Date(dateStr).getTime();
    const mins=Math.floor(diff/60000);
    if(mins<1)return _lang==='ar'?'الآن':_lang==='tr'?'Şimdi':'Just now';
    if(mins<60){
      if(_lang==='ar')return `منذ ${mins} دقيقة`;
      if(_lang==='tr')return `${mins}dk önce`;
      return `${mins}m ago`;
    }
    const hours=Math.floor(mins/60);
    if(hours<24){
      if(_lang==='ar')return `منذ ${hours} ساعة`;
      if(_lang==='tr')return `${hours}sa önce`;
      return `${hours}h ago`;
    }
    const days=Math.floor(hours/24);
    if(days<7){
      if(_lang==='ar')return `منذ ${days} يوم`;
      if(_lang==='tr')return `${days}g önce`;
      return `${days}d ago`;
    }
    const weeks=Math.floor(days/7);
    if(_lang==='ar')return `منذ ${weeks} أسبوع`;
    if(_lang==='tr')return `${weeks}h önce`;
    return `${weeks}w ago`;
  }catch(e){return dateStr;}
}
function makeMockEntries(){
  const titles=["Forest Spirit","Ancient Warrior","Misty Mountains","Dragon's Lair","Urban Sketches","Character Sheet","Concept Study","Environment Mood","Portrait Practice","Anatomy Study","Fantasy Architecture","Ocean Depths"];
  return titles.map((title,i)=>({
    id:gid(),title,category:CATEGORIES[i%5],
    date:new Date(Date.now()-(11-i)*7*86400000).toISOString(),
    timeSpent:Math.floor(Math.random()*120+20),
    mood:MOODS[i%MOODS.length],difficulty:DIFFICULTIES[i%4],
    description:"Practice session focusing on form and shading techniques.",
    notes:"Need to work on proportions and lighting.",
    liked:i%3===0,likes:Math.floor(Math.random()*40),
    color:COLORS[i%COLORS.length],tags:[CATEGORIES[i%5],"Practice"],imageUrl:null
  }));
}

// ============================================================
// API KEY MANAGER — obfuscated local storage
// ============================================================
// HONEST NOTE: this is obfuscation, not real encryption. In a pure
// client-side app the decryption key must ship in this same JS file,
// so anyone who can read this file can reverse it. What this DOES do:
// - stops the key from being trivially visible to a glance at DevTools
//   Application > Local Storage, or to a naive script that greps
//   localStorage values for strings that look like API keys (e.g. "AIza").
// - it does NOT protect against an attacker who can already execute
//   JavaScript on this page (e.g. a real XSS bug) — at that point they
//   can just call getApiKey() directly like the app itself does.
// True secret storage for an API key requires a server-side proxy.
const API_KEY_STORAGE='sj_api_key';
const _AK_XOR_KEY='SketchJourney#2026!Obfuscate';
function _akXor(str){
  let out='';
  for(let i=0;i<str.length;i++){
    out+=String.fromCharCode(str.charCodeAt(i)^_AK_XOR_KEY.charCodeAt(i%_AK_XOR_KEY.length));
  }
  return out;
}
function getApiKey(){
  const raw=localStorage.getItem(API_KEY_STORAGE);
  if(!raw)return'';
  // Legacy plaintext keys (stored before this obfuscation was added) are
  // recognizable by their known prefixes. atob() alone can't be trusted to
  // detect them — a plaintext key made only of base64-alphabet characters
  // decodes "successfully" into garbage instead of throwing.
  if(raw.startsWith('AIza')||raw.startsWith('sk-')){
    saveApiKey(raw); // migrate to the obfuscated format for next time
    return raw;
  }
  try{return _akXor(atob(raw));}
  catch(e){
    localStorage.removeItem(API_KEY_STORAGE);
    return'';
  }
}
function saveApiKey(key){
  const clean=key.trim();
  if(clean) localStorage.setItem(API_KEY_STORAGE,btoa(_akXor(clean)));
  else localStorage.removeItem(API_KEY_STORAGE);
}
function hasApiKey(){return !!getApiKey();}

// NOTE: this used to branch to signInWithRedirect() on mobile devices.
// That flow is unreliable on mobile browsers — a full page navigation away
// and back, which can silently fail to complete (private browsing modes,
// partitioned storage, etc.) leaving the user right back on the sign-in
// page with no error at all. signInWithPopup works fine on modern mobile
// browsers for a user-gesture-triggered click and never loses app state,
// so we now use it universally.
async function fbAuthGoogle(){
  await waitForFirebase();
  const f=fb();
  try{
    const cred=await f.signInWithPopup(f.auth,f.googleProvider);
    const snap=await f.getDoc(f.doc(f.db,'users',cred.user.uid));
    if(!snap.exists()){
      await createUserProfile(cred.user,cred.user.displayName||"Artist","Beginner");
    }
    return cred;
  }catch(e){
    // Only fall back to redirect for a genuinely blocked/unsupported popup
    // — any other error (wrong config, network, user closed it) should
    // surface normally rather than silently trying a second flow.
    if(e&&(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment')){
      // Redirect flow — result is handled in handleGoogleRedirectResult() on boot
      await f.signInWithRedirect(f.auth,f.googleProvider);
      return null;
    }
    throw e;
  }
}
async function handleGoogleRedirectResult(){
  const f=fb();
  try{
    const cred=await f.getRedirectResult(f.auth);
    if(cred&&cred.user){
      const snap=await f.getDoc(f.doc(f.db,'users',cred.user.uid));
      if(!snap.exists()){
        await createUserProfile(cred.user,cred.user.displayName||"Artist","Beginner");
      }
    }
  }catch(e){
    console.error('Google redirect sign-in failed:',e);
    S.showToast(
      '⚠️ '+(_lang==='ar'?'فشل تسجيل الدخول':_lang==='tr'?'Giriş başarısız':'Sign-in failed'),
      _lang==='ar'?'تعذّر إكمال تسجيل الدخول بجوجل — حاول مرة أخرى':_lang==='tr'?'Google girişi tamamlanamadı — tekrar deneyin':'Could not complete Google sign-in — please try again'
    );
    S.emit();
  }
}

async function createUserProfile(fbUser,name,skill){

  const profile={
    name,skill,bio:"",
    email:fbUser.email||"",

async function loadUserProfile(uid){

  return snap.exists()?snap.data():null;
}
async function saveUserProfile(uid,data){
  const f=fb();
  await f.setDoc(f.doc(f.db,'users',uid),data,{merge:true});
}

let entriesUnsubscribe=null;
function subscribeToEntries(uid){
  const f=fb();
  if(entriesUnsubscribe)entriesUnsubscribe();
  const q=f.query(f.collection(f.db,'users',uid,'entries'));
  entriesUnsubscribe=f.onSnapshot(q,async snap=>{
    const entries=[];
    for(const docSnap of snap.docs){
      const data={...docSnap.data(),id:docSnap.id};
      if(data.imageUrl&&typeof data.imageUrl==='string'&&data.imageUrl.startsWith('@@idb:')){
        const img=await loadImageFromIDB(docSnap.id);
        data.imageUrl=img||null;
      }
      entries.push(data);
    }
    S.entries=entries;
    S.emit();
  },err=>{
    console.error('Entries sync error:',err);
    S.showToast(
      '⚠️ '+(_lang==='ar'?'انقطعت المزامنة':_lang==='tr'?'Senkronizasyon kesildi':'Sync disconnected'),
      _lang==='ar'?'تعذّر تحميل أعمالك من السحابة — تحقق من اتصالك وأعد تحميل الصفحة':_lang==='tr'?'Eserlerin yüklenemedi — bağlantını kontrol edip sayfayı yenile':'Could not load your artwork from the cloud — check your connection and refresh the page'
    );
    S.emit();
  });
}
async function saveEntryToCloud(uid,entry){
  const f=fb();
  const toSave={...entry};
  delete toSave.id;
  if(toSave.imageUrl&&toSave.imageUrl.length>700000){
    await saveImageToIDB(entry.id,toSave.imageUrl);
    toSave.imageUrl=`@@idb:${entry.id}`;
  }
  await f.setDoc(f.doc(f.db,'users',uid,'entries',entry.id),toSave);
}
async function deleteEntryFromCloud(uid,entryId){
  const f=fb();
  await deleteImageFromIDB(entryId);
  await f.deleteDoc(f.doc(f.db,'users',uid,'entries',entryId));
}
function unsubscribeEntries(){
  if(entriesUnsubscribe){entriesUnsubscribe();entriesUnsubscribe=null;}
}

// Generic helper for any blocking network action (sign in, AI request...):
// shows `loadingText` right away, then swaps to a "still working / slow
// connection?" hint if it's still pending after `slowAfterMs`. This way a
// user on a weak connection always sees visible proof the app hasn't
// frozen, instead of a button/label that looks stuck with no feedback.
// `setText` is a small callback so this works whether the caller updates a
// button's textContent, a status dot's label, or anything else.
function withSlowNetworkHint(setText,loadingText,slowAfterMs=4000){
  setText(loadingText);
  const timer=setTimeout(()=>setText(t("stillConnecting")),slowAfterMs);
  return ()=>clearTimeout(timer);
}

      await saveUserProfile(uid, {fcmToken: token, fcmEnabledAt: new Date().toISOString()});

const STORAGE_KEY='sketchJourneyData';
const MAX_LS_SIZE=3*1024*1024;
// Real total usage across ALL localStorage keys (not just STORAGE_KEY) —
// this is what actually determines whether the browser will reject writes.
function getTotalLocalStorageSize(){
  let total=0;
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      const v=localStorage.getItem(k);
      if(v)total+=k.length+v.length;
    }
  }catch(e){}
  return total;
}
const DB_NAME='SketchJourneyDB',DB_VERSION=1,IMAGES_STORE='images';
let dbPromise=null;
function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(2)+' MB';}
function compressImage(base64,maxWidth=800,quality=0.75){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxWidth){h=(h*maxWidth)/w;w=maxWidth;}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
      const isPNG=base64.startsWith('data:image/png');
      const compressed=canvas.toDataURL(isPNG?'image/png':'image/jpeg',isPNG?undefined:quality);
      resolve(compressed.length<base64.length?compressed:base64);
    };
    img.onerror=reject;img.src=base64;
  });
}
function openDB(){
  if(dbPromise)return dbPromise;
  dbPromise=new Promise(resolve=>{
    if(!('indexedDB' in window)){resolve(null);return;}
    const r=indexedDB.open(DB_NAME,DB_VERSION);
    r.onerror=()=>resolve(null);r.onsuccess=()=>resolve(r.result);
    r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IMAGES_STORE))db.createObjectStore(IMAGES_STORE,{keyPath:'id'});};
  });return dbPromise;
}
async function saveImageToIDB(id,data){try{const db=await openDB();if(!db)return false;return new Promise(r=>{const tx=db.transaction(IMAGES_STORE,'readwrite');tx.objectStore(IMAGES_STORE).put({id,data,timestamp:Date.now()});tx.oncomplete=()=>r(true);tx.onerror=()=>r(false);});}catch(e){return false;}}

async function deleteImageFromIDB(id){try{const db=await openDB();if(!db)return false;return new Promise(r=>{const tx=db.transaction(IMAGES_STORE,'readwrite');tx.objectStore(IMAGES_STORE).delete(id);tx.oncomplete=()=>r(true);tx.onerror=()=>r(false);});}catch(e){return false;}}
async function smartSaveImage(id,data){
  if(!data)return null;if(data.length<102400)return data;
  const saved=await saveImageToIDB(id,data);if(saved)return`@@idb:${id}`;
  try{return await compressImage(data,500,0.5);}catch(e){return null;}
}
let _lsQuotaWarned=false; // avoid spamming the same toast on every save
async function saveState(){
  try{
    const data={isDark:S.isDark,lang:S.lang,insSaved:S.insSaved};
    const serialized=JSON.stringify(data);
    // Enforce MAX_LS_SIZE: check total usage (this key plus everything else
    // — the API key, Firestore's own offline cache is IndexedDB so it
    // doesn't count here) before writing, so we fail predictably instead of
    // letting the browser throw QuotaExceededError mid-write.
    const currentOther=getTotalLocalStorageSize()-(localStorage.getItem(STORAGE_KEY)||'').length;
    if(currentOther+serialized.length>MAX_LS_SIZE){
      console.warn('Local storage near capacity — skipping save to avoid quota error.');
      if(!_lsQuotaWarned){
        _lsQuotaWarned=true;
        S.showToast(
          '⚠️ '+(_lang==='ar'?'التخزين المحلي ممتلئ':_lang==='tr'?'Yerel depolama dolu':'Local storage full'),
          _lang==='ar'?'بعض التفضيلات قد لا تُحفظ — امسح البيانات من الإعدادات لتحرير مساحة':_lang==='tr'?'Bazı tercihler kaydedilmeyebilir — yer açmak için ayarlardan verileri temizleyin':'Some preferences may not save — clear data in Settings to free up space'
        );
        S.emit();
      }
      return;
    }
    localStorage.setItem(STORAGE_KEY,serialized);
  }catch(e){
    // QuotaExceededError can still happen (e.g. another tab filled storage
    // between our check and this write) — surface it instead of swallowing it.
    console.error('saveState failed:',e);
    if(!_lsQuotaWarned){
      _lsQuotaWarned=true;
      S.showToast(
        '⚠️ '+(_lang==='ar'?'تعذّر الحفظ محليًا':_lang==='tr'?'Yerel kayıt başarısız':'Local save failed'),
        _lang==='ar'?'التخزين المحلي ممتلئ أو غير متاح':_lang==='tr'?'Yerel depolama dolu veya kullanılamıyor':'Local storage is full or unavailable'
      );
      S.emit();
    }
  }
}

let previousUnlockedIds=new Set();

function getUnlockedAchievementIds(){
  const h=S.entries.reduce((s,e)=>s+e.timeSpent,0)/60;
  const c=S.entries.reduce((a,e)=>{a[e.category]=(a[e.category]||0)+1;return a},{});
  const streak=calcStreak();
  const gv=a=>{
    if(a.type==="drawings")return S.entries.length;
    if(a.type==="streak")return streak;
    if(a.type==="hours")return Math.floor(h);
    if(a.type==="fantasy")return c["Fantasy"]||0;
    if(a.type==="portrait")return c["Portrait"]||0;

  };

function checkNewAchievements(){

// RENDER ENGINE

function h(tag,attrs={},...children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")){const sig=currentController?.signal;if(sig)el.addEventListener(k.slice(2).toLowerCase(),v,{signal:sig});else el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="checked")el.checked=v;
    else if(k==="disabled")el.disabled=v;
    else if(v!==null&&v!==undefined&&v!==false)el.setAttribute(k,v);
  }
  children.flat(Infinity).forEach(c=>{if(c===null||c===undefined||c===false)return;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});
  return el;
}

function openFilePicker(callback){
  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>10485760){S.showToast("⚠️ File too large","Max 10MB");return;}
    try{
      const reader=new FileReader();
      reader.onload=async ev=>{
        const orig=ev.target.result;
        const comp=await compressImage(orig,800,0.75);
        callback(comp);
        const r=Math.round((1-comp.length/orig.length)*100);
        if(r>0)S.showToast("🗜️ Compressed",`Reduced by ${r}%`);
      };
      reader.readAsDataURL(file);
    }catch(err){
      const r=new FileReader();
      r.onload=ev=>{callback(ev.target.result);};
      r.readAsDataURL(file);
    }
  };
  input.click();
}

function initNetworkStatus(){
  const showBar=(kind)=>{
    // kind: null (remove), 'offline' (red, no connection), 'slow' (yellow, weak connection)
    const existing=document.getElementById('net-status');
    if(existing)existing.remove();
    if(!kind)return;
    const bar=document.createElement('div');
    bar.id='net-status';
    const isOffline=kind==='offline';
    bar.style.cssText=`position:fixed;top:0;left:0;right:0;background:${isOffline?'#f87171':'#fbbf24'};color:${isOffline?'white':'#1a1a1a'};text-align:center;padding:8px;font-size:13px;font-weight:600;z-index:99999;font-family:DM Sans,sans-serif`;
    bar.textContent=isOffline
      ?(_lang==='ar'?'⚠️ لا يوجد اتصال بالإنترنت':_lang==='tr'?'⚠️ İnternet bağlantısı yok':'⚠️ No internet connection')
      :(_lang==='ar'?'🐢 اتصال ضعيف — بعض العمليات قد تكون أبطأ من المعتاد':_lang==='tr'?'🐢 Zayıf bağlantı — bazı işlemler normalden yavaş olabilir':'🐢 Weak connection — some actions may be slower than usual');
    document.body.prepend(bar);
  };
  const evaluate=()=>{
    if(!navigator.onLine){showBar('offline');return;}
    // Network Information API: not supported in all browsers (notably
    // Safari/iOS) — feature-detect and degrade gracefully when absent.
    const conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
    if(conn){
      const slow=conn.saveData||['slow-2g','2g'].includes(conn.effectiveType)||(typeof conn.downlink==='number'&&conn.downlink>0&&conn.downlink<0.5);
      showBar(slow?'slow':null);
    }else{
      showBar(null);
    }
  };
  window.addEventListener('online',evaluate);
  window.addEventListener('offline',evaluate);
  const conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if(conn&&conn.addEventListener)conn.addEventListener('change',evaluate);
  evaluate();
}

// Gemini API helper
// Shared backend: calls the developer's own Cloudflare Worker (which holds
// the real Gemini key server-side) so regular users never need to create
// or enter any API key at all. Falls back to the user's own personal key
// (callGemini below) only if they explicitly added one in settings.
const AI_WORKER_URL = 'https://sketch-journey-ai1.sketch-journey-ai.workers.dev';
async function callGeminiViaWorker(prompt){
  const res = await fetchWithRetry(AI_WORKER_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || "AI service error");
  if(data.error) throw new Error(data.error);
  return data.text || "No response.";
}
// Daily free quota for the shared Worker: since everyone without a
// personal key uses the SAME backend Gemini key, one heavy user could
// exhaust the whole app's shared free-tier quota for the day. A small
// per-user daily allowance (resets at local midnight) keeps usage fair.
const DAILY_FREE_LIMIT = 5;
function ensureDailyReset(){
  const today = new Date().toDateString();
  if(S.dailyFreeDate !== today){
    S.dailyFreeDate = today;
    S.dailyFreeUsed = 0;
  }
}
function getDailyFreeRemaining(){
  ensureDailyReset();
  return Math.max(0, DAILY_FREE_LIMIT - (S.dailyFreeUsed||0));
}
async function callGemini(apiKey, prompt){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const res=await fetchWithRetry(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1000,temperature:0.7}})
  });
  const data=await res.json();
  if(!res.ok)throw new Error(data.error?.message||"Gemini API Error");
  return data.candidates?.[0]?.content?.parts?.[0]?.text||"No response.";
}
// API retry helper
async function fetchWithRetry(url, options, retries=2){
  for(let i=0;i<=retries;i++){
    try{
      const res=await fetch(url,options);
      return res;
    }catch(e){
      if(i===retries)throw e;
      await new Promise(r=>setTimeout(r,1000*(i+1)));
    }
  }
}

// streak calculator
function calcStreak(){
  if(S.entries.length===0)return 0;
  const days=new Set(S.entries.map(e=>new Date(e.date).toDateString()));
  let streak=0,cur=new Date();
  while(true){const ds=cur.toDateString();if(days.has(ds)){streak++;cur.setDate(cur.getDate()-1);}else if(streak===0){cur.setDate(cur.getDate()-1);if(Date.now()-cur.getTime()>2*86400000)break;}else break;}
  return streak;
}

function ResetPasswordModal(){
  const emailIn=h("input",{type:"email",placeholder:t("emailPh")});
  let sendBtn;
  sendBtn=h("button",{className:"btn btn-p",style:{width:"100%",justifyContent:"center",marginBottom:"10px"},onclick:async()=>{
    const email=emailIn.value.trim();
    if(!email){S.showToast("⚠️",_lang==='ar'?'أدخل بريدك الإلكتروني':'Enter your email');return;}
    sendBtn.disabled=true;
    const originalText=sendBtn.textContent;
    const clearSlowHint=withSlowNetworkHint(txt=>sendBtn.textContent=txt,t("sendLink"));
    try{
      await fbAuthReset(email);
      clearSlowHint();
      S.showToast(t("resetSent"),t("checkEmail"));S.modal=null;S.emit();
    }catch(e){
      clearSlowHint();
      sendBtn.disabled=false;sendBtn.textContent=originalText;
      S.showToast("⚠️",friendlyAuthError(e.code||e.message));
    }
  }},t("sendLink"));
  return h("div",{className:"modal-bg",onclick:()=>{S.modal=null;S.emit();}},
    h("div",{className:"modal",style:{maxWidth:"400px"},onclick:e=>e.stopPropagation()},
      h("div",{style:{textAlign:"center",marginBottom:"20px"}},
        h("div",{style:{fontSize:"40px",marginBottom:"10px"}},"🔐"),
        h("div",{style:{fontFamily:"Fraunces,serif",fontSize:"20px",fontWeight:700,marginBottom:"8px"}},t("forgotPass")),
        h("div",{style:{fontSize:"13px",color:"var(--muted)"}},t("resetDesc"))
      ),
      h("div",{style:{marginBottom:"16px"}},
        h("label",{style:{fontSize:"13px",fontWeight:600,color:"var(--muted)",display:"block",marginBottom:"6px"}},t("emailLbl")),
        emailIn
      ),
      sendBtn,
      h("button",{className:"btn btn-g",style:{width:"100%",justifyContent:"center"},onclick:()=>{S.modal=null;S.emit();}},t("cancelLbl"))
    )
  );
}

// BOOT
// ============================================================
// FIX: waitForFirebase() used to wait forever with no timeout — if the
// Firebase SDK failed to load for any reason (blocked script, offline,
// slow network, or the file opened directly as file:// instead of being
// served over http/https), every auth button would hang permanently with
// no feedback. Now it times out and rejects with a clear error instead.
function waitForFirebase(timeoutMs=20000){
  return new Promise((resolve,reject)=>{
    if(window.__firebaseReady)return resolve();
    const timer=setTimeout(()=>{
      window.removeEventListener('firebase-ready',onReady);
      reject(new Error('firebase-load-timeout'));
    },timeoutMs);
    function onReady(){clearTimeout(timer);resolve();}
    window.addEventListener('firebase-ready',onReady,{once:true});
  });
}

async function handleAuthChange(fbUser){
  if(fbUser){
    try{
      let profile=await loadUserProfile(fbUser.uid);
      const isNewUser=!profile;
      if(!profile){
        profile=await createUserProfile(fbUser,fbUser.displayName||"Artist","Beginner");
      }
      S.user={uid:fbUser.uid,id:fbUser.uid,email:fbUser.email||profile.email||"",...profile};
      S.aiAdCredits = profile.aiAdCredits || 0;
      S.profileForm={name:S.user.name,bio:S.user.bio||"",skill:S.user.skill};
      subscribeToEntries(fbUser.uid);
      if(S.notifs.length===0)S.notifs=S.getDefaultNotifs();
      S.go("inspiration"); // Redirect to Inspiration page after login
      // Show welcome modal with inspiration images for ALL users
      S.modal={type:"welcome"};
      if(isNewUser){
        S.showToast(t("welcomeToast"),t("welcomeToastBody"));
      }
    }catch(e){
      console.error('Auth profile load failed:',e);
      S.showToast("⚠️ Error","Could not load your profile. Please try again.");
    }
  }else{
    unsubscribeEntries();
    S.user=null;
    S.entries=[];
    S.aiAdCredits=0;
    S.go("auth");
  }
}

(async()=>{
  await openDB();
  // Load local prefs (lang/theme) without auth data
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const data=JSON.parse(raw);
      if(typeof data.isDark==='boolean')S.isDark=data.isDark;
      if(['en','ar','tr'].includes(data.lang))S.lang=data.lang;
      _lang=S.lang;
      document.documentElement.dir=S.lang==='ar'?'rtl':'ltr';
      document.documentElement.lang=S.lang;
      document.body.className=S.isDark?'':'light';
    }
  }catch(e){}

  initializeAchievementTracking();
  initNetworkStatus();
  // Establish the current page as the baseline history entry, and listen
  // for the back/forward button so it navigates within the app (per the
  // history entries S.go() now pushes) instead of the browser handling it
  // as "there's nothing before this page, leave the site."
  try{ history.replaceState({page:S.page},''); }catch(e){}
  window.addEventListener('popstate',(e)=>{
    if(S.modal){
      // Back was pressed while a modal was open — close the modal instead
      // of navigating to the previous page. The history entry the modal
      // pushed is the one that was just consumed by this back navigation,
      // so mark it as no longer pending before emit() re-checks state.
      S._modalPushed=false;
      S.modal=null;
      S.emit();
      return;
    }
    const page=e.state?.page;
    if(page){ S.page=page; S.sidebarOpen=false; S.emit(); }
  });
  S.on(render);
  render();

  // Service Worker — registered immediately, independent of Firebase.
  // It used to sit after the Firebase try/catch block below, meaning it
  // waited on that block's full timeout (up to 20s) before ever running,
  // even though the two have nothing to do with each other. Offline
  // support shouldn't be held hostage by a slow/failed Firebase connection.
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch((e)=>console.log('SW not available:',e.message));
  }

  try{
    await waitForFirebase();
    const f=fb();
    await handleGoogleRedirectResult();
    f.onAuthStateChanged(f.auth,handleAuthChange);
    listenForForegroundMessages();
  }catch(e){
    // FIX: previously an unguarded await here meant that if Firebase never
    // loaded (blocked script, no internet, or the file opened directly
    // instead of via a web server), the whole boot sequence silently froze
    // here forever — no auth listener got attached, and every button that
    // depended on Firebase would hang with no explanation. Now we surface
    // a clear, persistent message instead.
    console.error('Firebase failed to initialize:',e);
    S.showToast(
      '⚠️ '+(_lang==='ar'?'تعذّر الاتصال':_lang==='tr'?'Bağlanılamadı':'Connection failed'),
      _lang==='ar'?'تعذّر تحميل خدمات التطبيق. تأكد من فتحه عبر رابط ويب (وليس بالنقر على الملف مباشرة)، وتحقق من اتصالك بالإنترنت، ثم أعد تحميل الصفحة.':_lang==='tr'?'Uygulama servisleri yüklenemedi. Uygulamayı bir web adresi üzerinden açtığınızdan (dosyaya çift tıklamak yerine) ve internete bağlı olduğunuzdan emin olup sayfayı yenileyin.':'App services failed to load. Make sure this is opened via a web address (not by double-clicking the file), check your internet connection, then refresh the page.'
    );
  }

  // PWA Install prompt
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    setTimeout(()=>{
      if(!deferredPrompt)return;
      const banner=document.createElement('div');
      banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#c084fc,#818cf8);color:white;padding:12px 20px;border-radius:14px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:600;z-index:9998;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(192,132,252,0.4);cursor:pointer;white-space:nowrap';
      const txt=_lang==='ar'?'📲 تثبيت التطبيق':_lang==='tr'?'📲 Uygulamayı Yükle':'📲 Install App';
      banner.textContent=txt;
      banner.onclick=async()=>{
        deferredPrompt.prompt();
        const{outcome}=await deferredPrompt.userChoice;
        deferredPrompt=null;
        banner.remove();
      };
      const close=document.createElement('span');
      close.textContent='✕';close.style.cssText='margin-left:8px;opacity:0.7;cursor:pointer';
      close.onclick=e=>{e.stopPropagation();banner.remove();};
      banner.appendChild(close);
      document.body.appendChild(banner);
      setTimeout(()=>banner.remove(),8000);
    },3000);
  });
})();
</script>
</body>
</html>
